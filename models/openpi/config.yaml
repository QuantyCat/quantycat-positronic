# Quantycat SO-101 openpi / pi05 configuration.
#
# This file is intentionally local-path based. The dataset is already in
# LeRobot v2.1 format at input_dir and should not need a HuggingFace upload
# unless the installed openpi/LeRobot version refuses local paths.

input_dir: /home/caroline/quantycat-positronic/my_data/input_data
work_dir: /home/caroline/quantycat-positronic/my_data/training_pipeline/openpi

task_label: screwdriver
robot: so101_follower
prompt: "Put the screwdriver into the cup"

# openpi TrainConfig name to add/register.
config_name: pi05_quantycat
training_run_name: screwdriver_so101_pi05_h20_v1

# Dataset schema.
state_dim: 6
action_dim: 6
action_horizon: 20
fps: 30

# Model.
model_type: pi05
base_checkpoint: gs://openpi-assets/checkpoints/pi05_base/params

# Training defaults. Tune after the first loader/norm-stats smoke test.
batch_size: 8
num_workers: 2
num_train_steps: 5000
save_interval: 1000
keep_period: 5000
seed: 42
wandb_enabled: false
overwrite: false
resume: false

# Action convention for this dataset:
# action/state are 6-D absolute joint/gripper positions.
# During training, joints 0-4 should be converted to deltas relative to state;
# gripper dim 5 remains absolute.
delta_action_dims: 5
absolute_action_dims: 1
