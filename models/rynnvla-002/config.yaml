# Paths — relative to repo root
input_dir: my_data/input_data
work_dir: my_data/training_pipeline
training_output: training_output
task_label: screwdriver
robot: so101

# Must be consistent across preprocessing, training, and inference
chunk_size: 5
action_dim: 6
resolution: 256
his: 1

# Train/validation split
run_validation: true
val_ratio: 0.10
train_conversation_override: /home/caroline/quantycat-positronic/my_data/training_pipeline/conversations/libero_screwdriver_his_1_train_img_state_abs_ck_1_256_weighted.json

# Training
batch_size: 4
accum_iter: 4
num_workers: 6
epochs: 4
lr: 0.0001
min_lr: 0.00001
clip_grad: 24.0
train_z_loss_weight: 1e-3
loss_ct_weights: 10
fresh_start: true
ckpt_max_keep: 3
save_interval: 2000

# LoRA — trainable params: lora_weight_ + action_head + lm_head
lora_r: 16
lora_alpha: 32

# Inference
checkpoint: /home/caroline/quantycat-positronic/my_data/training_pipeline/fine_tuning/screwdriver_so101/epoch0
prompt: "Put the screwdriver into the cup"
robot_port: /dev/ttyACM0
robot_id: so101_follower
front_camera_index: /dev/video0
wrist_camera_index: /dev/video4
camera_width: 640
camera_height: 480
camera_fps: 30
gpu: 0
control_period_s: 0.05
max_steps: 0
max_seq_len: 4096
his_mode: 1h_1a_img_only_state
action_steps: 5
execute_steps_per_inference: 2
deterministic_crop: true
mask_image_logits: false
dropout: 0.08
inference_z_loss_weight: 1e-3
