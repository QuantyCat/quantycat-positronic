# Paths — relative to repo root
input_dir: my_data/input_data
work_dir: my_data/training_pipeline
training_output: training_output
task_label: screwdriver  # short label used in output filenames
robot: so101            # robot name

# Must be consistent across preprocessing, training, and inference
chunk_size: 5       # in paper - k = 10 for longer and k = 5 for shorter 
action_dim: 6        # specific to SO-101 robot (6 joints)
resolution: 256      # 256 is default value for RynnVLA-002
his: 2               # (history) the LeRobot training config uses his_1, LIBERO uses his_2 (in paper they use M = 2)

# Training
batch_size: 4        # samples per GPU per step
accum_iter: 4        # gradient accumulation steps — effective batch = batch_size × accum_iter
num_workers: 6       # CPU workers for data loading (machine has 32 cores)
epochs: 5            # paper says 14-19 for short tasks
lr: 0.0001           # was 5e-5; 2× bump — effective step ~5.5e-5 vs 1.8e-5 previously
min_lr: 0.00001      # end of cosine schedule; keep 10:1 ratio to lr
clip_grad: 24.0      # was 16.0 — more headroom given stable grad_norm ~31-44
z_loss_weight: 1e-3  # was 1e-5 — at 1e-5, z_loss contributes ~0.002 vs closs 14+, model has no incentive to reduce partition function
fresh_start: true    # true = delete output_dir and start from init_from; false = auto-resume last checkpoint
ckpt_max_keep: 3     # number of checkpoints to keep (~14GB each)
save_interval: 2000  # save a checkpoint every N iterations (within an epoch)

# LoRA — trainable params: lora_weight_ + action_head + lm_head
# (model lacks get_trainable_params so trainer warns and falls back to is_lora detection — behavior is correct)
lora_r: 16           # rank - higher = more capacity but more memory (8-64 typical)
lora_alpha: 32       # scaling factor - usually 2x lora_r

# Inference
checkpoint: /home/caroline/Desktop/fine_tuning/screwdriver_so101/04142026_epoch3
prompt: "Put the screwdriver into the cup"
robot_port: /dev/ttyACM0
robot_id: so101_follower
front_camera_index: /dev/video0
wrist_camera_index: /dev/video4
camera_width: 640
camera_height: 480
camera_fps: 30
gpu: 0
control_period_s: 0.05
max_steps: 0              # 0 = run forever until Ctrl+C
max_seq_len: 4096
his_mode: 1h_1a_img_only_state
action_steps: 5
mask_image_logits: false   # false = unmask image logits during inference
dropout: 0.0
z_loss_weight: 0.0
